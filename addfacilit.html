                const customID = `${governorate}-${item.name}`;
                const docRef = doc(db, "FacilitiesReference", customID);
                
                await setDoc(docRef, {
                    facilityName: item.name,
                    governorate: governorate,
                    lat: item.lat,
                    lng: item.lng,
                    staffList: [], 
                    lastUpdated: new Date()
                });
                count++;
                console.log(`✅ [${count}/109] تم رفع: ${customID}`);
            } catch (e) { 
                console.error(`❌ خطأ في ${item.name}: `, e);
            }
